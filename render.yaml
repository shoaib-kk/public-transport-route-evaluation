services:
  - type: web
    name: transport-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn transport_app.api:app --host 0.0.0.0 --port $PORT"
    plan: starter
    autoDeploy: true
    envVars:
      - key: FRONTEND_ORIGIN
        value: "*"
      - key: POLL_INTERVAL_SECONDS
        value: "30"
